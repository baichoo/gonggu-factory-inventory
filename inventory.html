function toast(m){var t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(function(){t.classList.remove('show');},2500);}
function ci(id){return document.getElementById(id);}

// 날짜
(function(){var d=new Date();var dy=['일','월','화','수','목','금','토'];ci('hdate').textContent=d.getFullYear()+'년 '+(d.getMonth()+1)+'월 '+d.getDate()+'일 '+dy[d.getDay()]+'요일';})();

// ITEMS 로드
fetch('https://baichoo.github.io/gonggu-factory-inventory/items.json')
.then(function(r){return r.json();})
.then(function(data){
  ITEMS=data;
  ITEMS.forEach(function(it){
    codeM[it.c]=it;
    if(it.b&&it.b!=='nan') bcM[it.b]=it;
  });
  ci('loading').style.display='none';
  ci('app').style.display='block';
  // 세션 복원
  var who=localStorage.getItem('gf_who')||'';
  var idx=STAFF.indexOf(who);
  if(idx>=0) selStaff(who,idx);
  // 데이터 로드
  loadR();
  setInterval(loadR,5000);
}).catch(function(e){
  ci('loading').innerHTML='<div style="color:#fff;text-align:center;padding:20px;"><div style="font-size:18px;margin-bottom:8px;">&#10060;</div><div>데이터 로드 실패</div><div style="font-size:11px;opacity:.7;margin-top:8px;">'+e+'</div><button onclick="location.reload()" style="margin-top:16px;padding:8px 20px;background:#fff;color:#1F3864;border:none;border-radius:8px;font-size:13px;cursor:pointer;">다시 시도</button></div>';
});

// 탭
function gTab(n){
  for(var i=0;i<3;i++){ci('t'+i).classList.remove('on');ci('p'+i).classList.remove('on');}
  ci('t'+n).classList.add('on');ci('p'+n).classList.add('on');
  if(n===1)rDash();
  if(n===2)rStat();
}

// 직원 선택
function selStaff(name,idx){
  cWho=name;localStorage.setItem('gf_who',name);
  ci('s1').style.display='none';ci('s2').style.display='block';
  ci('wav').textContent=name.charAt(0);ci('wav').style.background=BG[idx];ci('wav').style.color=TX[idx];
  ci('wnm').textContent=name;
  var s=localStorage.getItem('gf_sec')||'';
  if(s){var sel=ci('ssel');for(var i=0;i<sel.options.length;i++)if(sel.options[i].value===s){sel.value=s;cSec=s;break;}updS();}
}
function goBack(){
  cWho='';cSec='';
  ci('s1').style.display='block';ci('s2').style.display='none';
  ci('sbox').value='';ci('ilist').innerHTML='';
  updCnt();
}
function onSec(){
  cSec=ci('ssel').value;localStorage.setItem('gf_sec',cSec);updS();
}
function updS(){
  var b=ci('sbox'),btn=ci('sbtn'),sel=ci('ssel');
  if(cSec&&cWho){b.disabled=false;btn.disabled=false;b.placeholder='품목명 검색... ('+cSec+')';sel.style.borderColor='#1F3864';sel.style.background='#EEF3FB';sel.style.color='#1F3864';}
  else{b.disabled=true;btn.disabled=true;b.placeholder='섹터 선택 후 품목명 검색...';}
}
function updCnt(){
  STAFF.forEach(function(nm,i){
    var el=ci('cnt'+i);
    if(el){var c=allR.filter(function(r){return r.worker===nm;}).length;el.textContent='오늘 '+c+'건 입력';}
  });
}

// 검색
function setF(f,el){
  cFilt=f;document.querySelectorAll('.chip').forEach(function(c){c.classList.remove('on');});el.classList.add('on');doSearch();
}
function doSearch(){
  if(!cSec||!cWho){toast('섹터와 담당자를 먼저 선택하세요');return;}
  var q=ci('sbox').value.trim(),res=[];
  if(q.length>=1){
    var ql=q.toLowerCase();
    res=ITEMS.filter(function(it){
      var m=it.n.toLowerCase().indexOf(ql)>=0||it.c.toLowerCase().indexOf(ql)>=0||(it.b&&it.b.indexOf(q)>=0);
      if(!m)return false;
      if(cFilt==='미실사')return!doneS.has(it.c);
      if(cFilt==='완료')return doneS.has(it.c);
      if(cFilt==='바코드없음')return!it.b||it.b==='nan';
      return true;
    });
    if(res.length>60)res=res.slice(0,60);
  }else if(cFilt==='바코드없음'){res=ITEMS.filter(function(it){return!it.b||it.b==='nan';}).slice(0,60);}
  var ri=ci('rinfo'),il=ci('ilist');
  if(!q&&cFilt!=='바코드없음'){ri.textContent='품목명을 입력하거나 스캔하세요';il.innerHTML='';return;}
  ri.textContent='검색결과 '+res.length+'개'+(res.length===60?' (상위 60개)':'');
  if(!res.length){il.innerHTML='<div style="text-align:center;color:#bbb;padding:40px;font-size:13px;">검색 결과 없음</div>';return;}
  il.innerHTML=res.map(function(it){return mkCard(it,doneS.has(it.c));}).join('');
}

function mkCard(it,done){
  var sc=it.s>0?'ok':it.s<0?'mn':'zr';
  var ar=it.s>0?'&#9650;':it.s<0?'&#9660;':'';
  var hb=it.b&&it.b!=='nan';
  var bt=hb?'<span style="font-size:10px;color:#555;background:#f0f0f0;padding:1px 6px;border-radius:5px;margin-left:4px;">'+it.b+'</span>'
          :'<span style="font-size:10px;color:#c0392b;background:#fff5f5;padding:1px 6px;border-radius:5px;margin-left:4px;">바코드없음</span>';
  var id='x'+it.c.replace(/[^a-zA-Z0-9]/g,'x');
  var rc=allR.filter(function(r){return r.code===it.c;});
  var tot=rc.reduce(function(a,r){return a+(r.actual_qty||0);},0);

      +'<div class="sb '+sc+'"><span class="sa">'+ar+'</span><span class="sn">'+fmt(Math.abs(it.s))+'</span><span class="su">'+eh(it.u||'')+'</span></div></div>'
      +'<div class="ic">'+it.c+' '+bt+'</div>'
      +'<div class="db"><span>&#10003; 완료 총 <b>'+tot+(it.u||'')+'</b></span>'
      +'<span style="color:#1976D2;cursor:pointer;text-decoration:underline;" onclick="openC.add(''+id+'');doSearch();">+ 추가</span></div></div>';
  }
  var sopts=SECTORS.map(function(s){return'<option value="'+s+'">'+s+'</option>';}).join('');
  return '<div class="icard"><div class="ih"><div class="in">'+eh(it.n)+'</div>'
    +'<div class="sb '+sc+'"><span class="sa">'+ar+'</span><span class="sn">'+fmt(Math.abs(it.s))+'</span><span class="su">'+eh(it.u||'')+'</span></div></div>'
    +'<div class="ic">'+it.c+' '+bt+'</div>'
    +'<div class="ia">'
    +'<div style="display:flex;gap:6px;align-items:center;margin-bottom:8px;padding:6px 8px;background:#EEF3FB;border-radius:8px;font-size:11px;">'
    +'<span>&#128205; <b>'+cSec+'</b></span><span style="color:#ddd">|</span><span>&#128100; <b>'+cWho+'</b></span>'
    +'<span style="color:#1976D2;margin-left:auto;cursor:pointer;font-size:10px;" onclick="goBack()">변경</span></div>'
    +'<div class="ig2"><div><label class="gl">단위:'+(it.u||'-')+'</label>'
    +'<input class="inp qty" id="q'+id+'" type="number" inputmode="numeric" min="0" placeholder="0" oninput="calcD(''+id+'','+it.s+')"></div>'
    +'<div><label class="gl">차이</label><input class="inp" id="d'+id+'" readonly placeholder="-"></div></div>'
    +'<div class="ig2"><div><label class="gl">상태</label><select class="inp" id="st'+id+'" style="font-size:12px;">'
    +'<option>정상</option><option>미발견</option><option>파손</option><option>단종</option><option>반품필요</option><option>확인필요</option></select></div>'
    +'<div><label class="gl">비고</label><input class="inp" id="m'+id+'" placeholder="메모"></div></div>'
    +'<div><label class="gl">바코드 '+(hb?'('+it.b+')':'미등록!')+'</label>'
    +'<div class="bcr"><input class="inp" id="b'+id+'" value="'+(hb?it.b:'')+'" placeholder="스캔 또는 입력" inputmode="numeric">'
    +'<button class="bcam" onclick="openCam('r'+id+'')">&#128247;</button></div></div>'
    +'<button class="sbtn" onclick="doSave(this,''+it.c.replace(/'/g,"\'").substring(0,40)+'','
    +'''+it.n.replace(/'/g,"\'").replace(/[
]/g,'').substring(0,40)+'','
    +'''+eh(it.u||'')+'','+it.s+','+it.p+',''+id+'')">저장 (실시간 공유)</button>'
    +'</div></div>';
}

function calcD(id,sys){
  var q=parseFloat(ci('q'+id).value),d=ci('d'+id);
  if(!d)return;
  if(isNaN(q)){d.value='';d.className='inp';return;}
  var diff=q-sys;d.value=(diff>=0?'+':'')+diff;
  d.className='inp'+(diff>0?' dp':diff<0?' dn':'');
}

function doSave(btn,code,name,unit,sys,price,id){
  var qty=parseFloat(ci('q'+id).value);
  if(isNaN(qty)||qty<0){toast('수량을 입력하세요');return;}
  if(!cSec||!cWho){toast('섹터·담당자를 먼저 설정하세요');return;}
  var memo=ci('m'+id).value.trim(),sta=ci('st'+id).value,nbc=ci('b'+id).value.trim();
  btn.disabled=true;btn.textContent='저장 중...';
  fetch(SU+'/rest/v1/inventory_records',{
    method:'POST',
    headers:{'Content-Type':'application/json','apikey':SK,'Authorization':'Bearer '+SK,'Prefer':'return=minimal'},
    body:JSON.stringify({code:code,name:name,unit:unit,sys_stock:sys,actual_qty:qty,sector:cSec,worker:cWho,
      barcode:(codeM[code]&&codeM[code].b)||'',new_barcode:nbc,status:sta,memo:memo,price:price})
  }).then(function(r){
    if(!r.ok)return r.text().then(function(t){throw new Error(t);});
    if(nbc&&nbc!=='nan'){var it=codeM[code];if(it){it.b=nbc;bcM[nbc]=it;}}
    openC.delete(id);toast('저장완료!');loadR();doSearch();
  }).catch(function(e){toast('저장실패: '+e.message);btn.disabled=false;btn.textContent='저장 (실시간 공유)';});
}

// 데이터 로드 (5초 폴링)
function loadR(){
  fetch(SU+'/rest/v1/inventory_records?select=*&order=created_at.desc',{
    headers:{'apikey':SK,'Authorization':'Bearer '+SK}
  }).then(function(r){return r.json();}).then(function(data){
    allR=data||[];doneS=new Set(allR.map(function(r){return r.code;}));
    ci('obadge').textContent='&#9899; 연결됨';ci('obadge').style.background='rgba(76,175,80,.3)';
    updCnt();
    if(ci('p1').classList.contains('on'))rDash();
    if(ci('p2').classList.contains('on'))rStat();
  }).catch(function(){ci('obadge').textContent='&#9679; 오프라인';});
}

// 실시간 대시보드
function rDash(){
  var dash=ci('sdash'),det=ci('sdet');
  if(detW){det.style.display='block';dash.style.display='none';rDet(detW);return;}
  det.style.display='none';dash.style.display='block';
  var mx=1;STAFF.forEach(function(w){var c=allR.filter(function(r){return r.worker===w;}).length;if(c>mx)mx=c;});
  var tot=allR.length,dn=doneS.size,dc=allR.filter(function(r){return r.diff!=0;}).length;
  var h='<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;padding:12px 12px 0;margin-bottom:14px;">'
    +'<div style="background:#1F3864;border-radius:10px;padding:10px 8px;text-align:center;"><div style="font-size:20px;font-weight:700;color:#fff;">'+tot+'</div><div style="font-size:10px;color:rgba(255,255,255,.65);">총입력건</div></div>'
    +'<div style="background:#1F3864;border-radius:10px;padding:10px 8px;text-align:center;"><div style="font-size:20px;font-weight:700;color:#fff;">'+dn+'</div><div style="font-size:10px;color:rgba(255,255,255,.65);">완료품목</div></div>'
    +'<div style="background:#C62828;border-radius:10px;padding:10px 8px;text-align:center;"><div style="font-size:20px;font-weight:700;color:#fff;">'+dc+'</div><div style="font-size:10px;color:rgba(255,255,255,.65);">재고차이</div></div>'
    +'</div><div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:0 12px 12px;">';
  STAFF.forEach(function(nm,i){
    var rc=allR.filter(function(r){return r.worker===nm;});
    var cnt=rc.length,last=rc[0],pct=Math.round(cnt/mx*100);
    var lt=last?last.name.substring(0,14)+' '+last.actual_qty+(last.unit||''):'입력 없음';
    h+='<div onclick="openD(''+nm+'')" style="background:#fff;border:0.5px solid #E8EDF4;border-radius:12px;padding:14px 12px;cursor:pointer;position:relative;overflow:hidden;">'
      +'<div style="pointer-events:none;position:absolute;top:0;left:0;right:0;height:3px;background:'+COLORS[i]+';border-radius:12px 12px 0 0;"></div>'
      +'<div style="pointer-events:none;width:34px;height:34px;border-radius:50%;background:'+BG[i]+';color:'+TX[i]+';display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:600;margin-bottom:8px;">'+nm.charAt(0)+'</div>'
      +'<div style="pointer-events:none;font-size:13px;font-weight:600;color:#1a1a1a;margin-bottom:2px;">'+nm+'</div>'
      +'<div style="pointer-events:none;font-size:10px;color:#888;margin-bottom:8px;">'+(rc.length>0&&rc[0].sector?rc[0].sector:'섹터미지정')+'</div>'
      +'<div style="pointer-events:none;height:4px;background:#eee;border-radius:2px;margin-bottom:6px;overflow:hidden;"><div style="height:4px;border-radius:2px;width:'+pct+'%;background:'+COLORS[i]+';"></div></div>'
      +'<div style="pointer-events:none;display:flex;justify-content:space-between;align-items:flex-end;">'
      +'<div><div style="font-size:22px;font-weight:700;color:#1a1a1a;line-height:1;">'+cnt+'</div><div style="font-size:10px;color:#888;margin-top:2px;">입력건</div></div>'
      +'<span style="font-size:9px;padding:2px 7px;border-radius:10px;font-weight:600;background:'+(cnt>0?'#E8F5E9':'#F5F5F5')+';color:'+(cnt>0?'#1B5E20':'#888')+';">'+(cnt>0?'작업중':'대기중')+'</span></div>'
      +'<div style="pointer-events:none;margin-top:8px;padding-top:7px;border-top:0.5px solid #f0f0f0;font-size:10px;color:#aaa;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">최근: <b>'+lt+'</b></div>'
      +'</div>';
  });
  h+='</div>';dash.innerHTML=h;
}
function openD(w){detW=w;ci('dtitle').textContent=w+' 입력 내역';ci('sdash').style.display='none';ci('sdet').style.display='block';rDet(w);}
function closeD(){detW=null;ci('sdash').style.display='block';ci('sdet').style.display='none';rDash();}
function rDet(w){
  var el=ci('dlist'),rc=allR.filter(function(r){return r.worker===w;});
  if(!rc.length){el.innerHTML='<div style="text-align:center;color:#bbb;padding:40px;font-size:13px;">입력 내역 없음</div>';return;}
  el.innerHTML=rc.map(function(r){
    return'<div class="li"><div style="display:flex;justify-content:space-between;align-items:center;">'
      +'<div class="ln">'+eh(r.name)+'</div>'
      +'<div style="display:flex;gap:8px;align-items:center;">'
      +'<span style="font-size:10px;color:#aaa;">'+fdt(r.created_at)+'</span>'
      +'<span style="color:#e53935;cursor:pointer;font-size:13px;" onclick="delR(''+r.id+'')">&#10005;</span></div></div>'
      +'<div class="lm"><span>&#128205;<b>'+eh(r.sector||'-')+'</b></span>'
      +'<span>&#128230;실사:<b style="color:#1F3864;">'+r.actual_qty+(r.unit||'')+'</b></span>'
      +'<span style="'+(r.diff>0?'color:#2E7D32':r.diff<0?'color:#C62828':'')+'">차이:<b>'+(r.diff>=0?'+':'')+r.diff+'</b></span>'
      +(r.new_barcode?'<span>&#128202;<b>'+r.new_barcode+'</b></span>':'')
      +(r.status&&r.status!=='정상'?'<span style="color:#C62828;">['+r.status+']</span>':'')
      +(r.memo?'<span>&#128221;'+r.memo+'</span>':'')
      +'</div></div>';
  }).join('');
}
function delR(id){
  if(!confirm('삭제?'))return;
  fetch(SU+'/rest/v1/inventory_records?id=eq.'+id,{method:'DELETE',headers:{'apikey':SK,'Authorization':'Bearer '+SK}})
  .then(function(){toast('삭제됨');loadR();});
}

// 집계
function rStat(){
  var bD={},bS={},bW={},tot=0,pl=0,mn=0,bc=0;
  allR.forEach(function(r){
    var d=new Date(r.created_at).toLocaleDateString('ko-KR',{month:'long',day:'numeric',weekday:'short'});
    bD[d]=(bD[d]||0)+1;bS[r.sector]=(bS[r.sector]||0)+1;bW[r.worker]=(bW[r.worker]||0)+1;
    tot++;if(r.diff>0)pl++;else if(r.diff<0)mn++;if(r.new_barcode)bc++;
  });
  var h='<div class="sum"><div class="si"><div class="sv">'+tot+'</div><div class="sl">총입력건</div></div>'
    +'<div class="si"><div class="sv">'+doneS.size+'</div><div class="sl">완료품목</div></div>'
    +'<div class="si"><div class="sv" style="color:#81C784;">'+pl+'</div><div class="sl">재고초과</div></div>'
    +'<div class="si"><div class="sv" style="color:#EF9A9A;">'+mn+'</div><div class="sl">재고부족</div></div>'
    +'<div class="si"><div class="sv" style="color:#4FC3F7;">'+bc+'</div><div class="sl">바코드등록</div></div></div>';
  function mkS(t,o){var e=Object.entries(o).sort(function(a,b){return b[1]-a[1];});if(!e.length)return'';
    return'<div class="sc"><div class="st">'+t+'</div>'+e.map(function(v){return'<div class="sr"><span>'+v[0]+'</span><span style="font-weight:600;color:#1F3864;">'+v[1]+'건</span></div>';}).join('')+'</div>';}
  h+=mkS('&#128197; 날짜별',bD)+mkS('&#128100; 담당자별',bW)+mkS('&#128205; 섹터별',bS);
  ci('stat').innerHTML=h;
}

// CSV
function doExp(){
  if(!allR.length){toast('데이터 없음');return;}
  var hdr=['품목코드','품목명','단위','시스템재고','실사수량','차이','섹터','담당자','기존바코드','신규바코드','상태','비고','입력일시'];
  var rows=allR.map(function(r){return[r.code,r.name,r.unit,r.sys_stock,r.actual_qty,r.diff,r.sector,r.worker,r.barcode||'',r.new_barcode||'',r.status||'',r.memo||'',new Date(r.created_at).toLocaleString('ko-KR')]
    .map(function(v){return'"'+String(v||'').replace(/"/g,'""')+'"';}).join(',');});
  var a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob(['﻿'+[hdr.join(',')].concat(rows).join('
')],{type:'text/csv;charset=utf-8'}));
  a.download='실사결과_'+Date.now()+'.csv';a.click();toast('CSV 완료');
}
function doCl(){
  if(!confirm('전체 초기화?'))return;
  fetch(SU+'/rest/v1/inventory_records?id=neq.00000000-0000-0000-0000-000000000000',{method:'DELETE',headers:{'apikey':SK,'Authorization':'Bearer '+SK}})
  .then(function(){toast('초기화 완료');loadR();});
}

// 카메라
function openCam(m){camM=m;ci('ctit').textContent=m==='s'?'품목 검색':'바코드 등록';ci('cam').classList.add('show');ci('cinp').value='';startCam();}
function closeCam(){stopCam();ci('cam').classList.remove('show');}
function startCam(){
  stopCam();
  var hint=ci('chint');hint.textContent='카메라 준비 중...';
  if(typeof ZXing==='undefined'){hint.textContent='카메라 라이브러리 로딩 중...';setTimeout(startCam,1500);return;}
  try{
    var h=new Map();
    h.set(ZXing.DecodeHintType.POSSIBLE_FORMATS,[ZXing.BarcodeFormat.EAN_13,ZXing.BarcodeFormat.EAN_8,ZXing.BarcodeFormat.CODE_128,ZXing.BarcodeFormat.CODE_39,ZXing.BarcodeFormat.UPC_A,ZXing.BarcodeFormat.QR_CODE]);
    h.set(ZXing.DecodeHintType.TRY_HARDER,true);
    camR=new ZXing.BrowserMultiFormatReader(h);
    ZXing.BrowserCodeReader.listVideoInputDevices().then(function(devs){
      var bk=devs.find(function(d){return/(back|rear|environment)/i.test(d.label);});
      var dv=(bk||devs[devs.length-1]);
      scanning=true;hint.textContent='바코드를 프레임에 맞춰주세요';
      camR.decodeFromVideoDevice(dv&&dv.deviceId,ci('cv'),function(res){
        if(!scanning||!res)return;scanning=false;closeCam();handleScan(res.getText());
      });
    });
  }catch(e){hint.textContent='카메라 불가 — 직접 입력하세요';}
}
function stopCam(){
  scanning=false;
  if(camR){try{camR.reset();}catch(e){}camR=null;}
  var v=ci('cv');if(v&&v.srcObject){v.srcObject.getTracks().forEach(function(t){t.stop();});v.srcObject=null;}
}
function appCam(){var v=ci('cinp').value.trim();if(!v){toast('바코드를 입력하세요');return;}closeCam();handleScan(v);}
function handleScan(bc){
  if(camM==='s'){var it=bcM[bc];if(it){ci('sbox').value=it.n.substring(0,12);doSearch();toast(bc+' 검색됨');}else{ci('sbox').value=bc;doSearch();toast('미등록: '+bc);}}
  else{var el=ci('b'+camM.replace('r',''));if(el){el.value=bc;el.style.borderColor='#2E7D32';toast('바코드: '+bc);}}
}
</script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/zxing-js/0.21.3/zxing.min.js" async></script>
