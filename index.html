<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>공구팩토리 관리 시스템</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f0f2f5;color:#1a1a1a;}
.hero{background:linear-gradient(135deg,#1a2a4a,#2c4a7c);color:#fff;padding:32px 20px 28px;text-align:center;}
.hero-sub{font-size:13px;color:rgba(255,255,255,0.6);letter-spacing:1px;margin-bottom:8px;}
.hero-title{font-size:22px;font-weight:700;margin-bottom:16px;}
.date-badge{display:inline-block;background:rgba(255,255,255,0.15);border:1px solid rgba(255,255,255,0.25);border-radius:20px;padding:6px 18px;font-size:13px;color:rgba(255,255,255,0.9);}
.notice{margin:16px;background:#fff;border-radius:12px;padding:14px 16px;border-left:4px solid #2c5282;display:flex;align-items:flex-start;gap:10px;}
.notice-ico{font-size:16px;flex-shrink:0;margin-top:1px;}
.notice-text{font-size:13px;color:#444;line-height:1.5;}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;padding:0 16px 20px;}
.card{background:#fff;border-radius:14px;padding:20px 16px 18px;cursor:pointer;position:relative;overflow:hidden;border:2px solid transparent;text-decoration:none;display:block;}
.card:active{opacity:0.9;}
.card.active{border-color:currentColor;}
.card-badge{position:absolute;top:12px;right:12px;font-size:10px;font-weight:600;border-radius:6px;padding:2px 8px;}
.badge-live{background:#e6f4ea;color:#1e7e34;}
.badge-ready{background:#fef3cd;color:#856404;}
.card-icon{width:52px;height:52px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:24px;margin-bottom:12px;}
.card-title{font-size:15px;font-weight:700;color:#1a1a1a;margin-bottom:4px;}
.card-desc{font-size:12px;color:#888;line-height:1.5;}
.card-bar{position:absolute;bottom:0;left:0;right:0;height:3px;}
/* 카드별 색상 */
.card-blue .card-icon{background:#e8f0fe;}
.card-blue .card-bar{background:#2c5282;}
.card-green .card-icon{background:#e6f4ea;}
.card-green .card-bar{background:#2e7d32;}
.card-amber .card-icon{background:#fff8e1;}
.card-amber .card-bar{background:#f59e0b;}
.card-purple .card-icon{background:#f3e8ff;}
.card-purple .card-bar{background:#7c3aed;}
.card-red .card-icon{background:#fce8e8;}
.card-red .card-bar{background:#dc2626;}
.card-gray .card-icon{background:#f3f4f6;}
.card-gray .card-bar{background:#6b7280;}
.footer{text-align:center;padding:12px;font-size:11px;color:#bbb;padding-bottom:20px;}
</style>
</head>
<body>

<div class="hero">
  <div class="hero-sub">공구팩토리</div>
  <div class="hero-title">재고·매입·매출 통합 관리 시스템</div>
  <div class="date-badge" id="dateText"></div>
</div>

<div class="notice">
  <div class="notice-ico">📢</div>
  <div class="notice-text">재고실사 진행 중입니다. 담당 구역 실사 완료 후 집계탭에서 확인하세요.</div>
</div>

<div class="grid">
  <a class="card card-blue" href="https://incandescent-banoffee-f3c173.netlify.app">
    <div class="card-badge badge-live">실시간</div>
    <div class="card-icon">📦</div>
    <div class="card-title">재고 실사</div>
    <div class="card-desc">실물 재고 파악<br>바코드 스캔 지원</div>
    <div class="card-bar"></div>
  </a>
  <a class="card card-green" href="#">
    <div class="card-badge badge-ready">준비중</div>
    <div class="card-icon">🏪</div>
    <div class="card-title">재고 현황</div>
    <div class="card-desc">품목별 현재고<br>입출고 이력</div>
    <div class="card-bar"></div>
  </a>
  <a class="card card-amber" href="#">
    <div class="card-badge badge-ready">준비중</div>
    <div class="card-icon">🛒</div>
    <div class="card-title">매입 관리</div>
    <div class="card-desc">발주·입고 관리<br>공급업체별 현황</div>
    <div class="card-bar"></div>
  </a>
  <a class="card card-purple" href="#">
    <div class="card-badge badge-ready">준비중</div>
    <div class="card-icon">💰</div>
    <div class="card-title">매출 관리</div>
    <div class="card-desc">거래처별 매출<br>월별 실적 분석</div>
    <div class="card-bar"></div>
  </a>
  <a class="card card-red" href="#">
    <div class="card-badge badge-ready">준비중</div>
    <div class="card-icon">📊</div>
    <div class="card-title">경영 분석</div>
    <div class="card-desc">매출 추이<br>마진율 분석</div>
    <div class="card-bar"></div>
  </a>
  <a class="card card-gray" href="#">
    <div class="card-badge badge-ready">준비중</div>
    <div class="card-icon">⚙️</div>
    <div class="card-title">설정</div>
    <div class="card-desc">품목 관리<br>직원·권한 설정</div>
    <div class="card-bar"></div>
  </a>
</div>

<div class="footer">공구팩토리 내부 시스템 v1.0</div>

<script>
const d = new Date();
const days = ['일','월','화','수','목','금','토'];
document.getElementById('dateText').textContent =
  `${d.getFullYear()}년 ${d.getMonth()+1}월 ${d.getDate()}일 ${days[d.getDay()]}요일`;
</script>
</body>
</html>
